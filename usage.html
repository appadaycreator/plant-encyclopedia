<h1>📋 使い方</h1><h2>検索・フィルター</h2><p>植物名や特徴（初心者、日陰OK等）で検索できます。難易度・日光量のフィルターで絞り込みも可能です。</p><h2>詳細表示</h2><p>植物カードをタップすると、水やり頻度・日光・最低温度・育て方のポイントが表示されます。</p><h2>お気に入り</h2><p>ハートボタンでお気に入りに追加。「お気に入り」タブで一覧確認できます。データはブラウザに保存されます。</p>
